name = "EconCSLib"
version = "0.1.0"
keywords = ["math"]
defaultTargets = [
  "EconCSLib",
  "GCG24UserItemFairness",
  "DSWG24DiscretizationBias",
  "MBJG25ProducerFairness",
  "LG21TestOptionalPolicies",
  "GN21DriverSurgePricing",
  "Roth82StableMatching",
  "GS62CollegeAdmissions",
  "GHW01DigitalGoods",
  "MSVV07AdWords",
  "GJ18InformativeRatingSystems",
  "GGSG19TopThree",
  "PKG25NoFreeLunch",
  "LMMS04FairDivision",
  "LOS02CombinatorialAuctions",
]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3
weak.linter.unnecessarySimpa = false
weak.linter.unusedDecidableInType = false
weak.linter.unusedFintypeInType = false
weak.linter.unusedSectionVars = false
weak.linter.unusedVariables = false
weak.linter.flexible = false
weak.linter.style.longLine = false
weak.linter.style.whitespace = false

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.30.0-rc2"

[[require]]
name = "cslib"
scope = "leanprover"
rev = "v4.30.0-rc2"

[[lean_lib]]
name = "EconCSLib"

[[lean_lib]]
name = "GCG24UserItemFairness"
srcDir = "papers"

