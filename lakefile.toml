name = "EconCSLean"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["EconCSLean"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3
# These warnings are high-volume in existing proof files and obscure real build
# failures in agent logs. Keep proof obligations enforced; quiet only style/noise.
weak.linter.unnecessarySimpa = false
weak.linter.unusedDecidableInType = false
weak.linter.unusedFintypeInType = false
weak.linter.unusedSectionVars = false
weak.linter.unusedVariables = false
weak.linter.flexible = false
weak.linter.style.longLine = false

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.30.0-rc2"

[[require]]
name = "cslib"
scope = "leanprover"
rev = "v4.30.0-rc2"

[[lean_lib]]
name = "EconCSLean"

[[lean_lib]]
name = "DecisionFairness"

[[lean_lib]]
name = "DecisionCore"

[[lean_lib]]

[[lean_lib]]
name = "UserItemFairness"

[[lean_lib]]
name = "AccuracyDiversity"

[[lean_lib]]
name = "DiscretizationBias"

[[lean_lib]]
name = "ProducerFairness"
