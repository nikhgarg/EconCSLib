<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EconCSLib favicon preview</title>
    <link rel="icon" href="assets/econcslib-favicon.svg?v=2" type="image/svg+xml">
    <style>
      body {
        margin: 32px;
        color: #18212f;
        background: #ffffff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .preview {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 18px;
        margin-top: 22px;
      }

      .swatch {
        display: grid;
        gap: 8px;
        justify-items: center;
        color: #516071;
        font-size: 0.9rem;
      }

      img.size-64 {
        width: 64px;
        height: 64px;
      }

      img.size-32 {
        width: 32px;
        height: 32px;
      }

      img.size-16 {
        width: 16px;
        height: 16px;
      }
    </style>
  </head>
  <body>
    <h1>EconCSLib favicon preview</h1>
    <p>Current teal full-name favicon, shown at common rendered sizes.</p>
    <div class="preview">
      <div class="swatch">
        <img class="size-64" src="assets/econcslib-favicon.svg?v=2" alt="EconCSLib favicon at 64px">
        <span>64px</span>
      </div>
      <div class="swatch">
        <img class="size-32" src="assets/econcslib-favicon.svg?v=2" alt="EconCSLib favicon at 32px">
        <span>32px</span>
      </div>
      <div class="swatch">
        <img class="size-16" src="assets/econcslib-favicon.svg?v=2" alt="EconCSLib favicon at 16px">
        <span>16px</span>
      </div>
    </div>
  </body>
</html>
